<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>WA Road Trip 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--ocean:#0EA5E9;--ocean-dk:#0284C7;--sun:#F59E0B;--reef:#10B981;--coral:#F43F5E;--sand:#FEF3C7;--g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;--g400:#94A3B8;--g500:#64748B;--g600:#475569;--g700:#334155;--g800:#1E293B;--r:16px;--rs:10px;--sh:0 1px 3px rgba(0,0,0,.08);--shl:0 8px 24px rgba(0,0,0,.1)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--g50);color:var(--g800);min-height:100vh;padding-bottom:72px}
/* HEADER */
.hdr{background:linear-gradient(135deg,var(--ocean),var(--ocean-dk));color:#fff;padding:16px 16px 0;position:sticky;top:0;z-index:100;box-shadow:var(--shl)}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:-.5px}
.hdr p{font-size:12px;opacity:.85;margin-top:1px}
.day-strip{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;scrollbar-width:none}
.day-strip::-webkit-scrollbar{display:none}
.dc{flex-shrink:0;padding:7px 12px;border-radius:18px;font-size:11px;font-weight:600;cursor:pointer;background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.25);text-align:center;min-width:48px}
.dc.active{background:#fff;color:var(--ocean-dk);border-color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.dc .dn{display:block;font-size:14px;font-weight:800}
.dc .dd{display:block;font-size:10px;opacity:.8;margin-top:1px}
/* TABS */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid var(--g200);z-index:100;padding-bottom:env(safe-area-inset-bottom,0);box-shadow:0 -2px 10px rgba(0,0,0,.05)}
.tab{flex:1;padding:7px 2px 5px;text-align:center;cursor:pointer;font-size:9px;color:var(--g400);display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:600}
.tab.active{color:var(--ocean)}
.tab svg{width:20px;height:20px}
/* CONTENT */
.content{padding:14px;max-width:600px;margin:0 auto}
.section{display:none}
.section.active{display:block}
/* CARDS */
.card{background:#fff;border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh);border:1px solid var(--g100)}
.card-title{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card p{font-size:13px;line-height:1.5;color:var(--g600)}
.card a{color:var(--ocean);font-size:12px;text-decoration:none}
.card a:hover{text-decoration:underline}
.badge{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600}
.badge-green{background:#D1FAE5;color:#065F46}
.badge-amber{background:#FEF3C7;color:#92400E}
.badge-blue{background:#DBEAFE;color:#1D4ED8}
/* HOME PAGE */
.hero{background:linear-gradient(135deg,var(--ocean),#6366F1);color:#fff;border-radius:var(--r);padding:20px;margin-bottom:12px;text-align:center}
.hero h2{font-size:22px;font-weight:800}
.hero p{font-size:13px;opacity:.9;margin-top:4px}
.countdown{display:flex;justify-content:center;gap:16px;margin-top:14px;background:rgba(255,255,255,.15);border-radius:12px;padding:12px}
.countdown .unit strong{font-size:22px;font-weight:900;display:block}
.countdown .unit span{font-size:10px;opacity:.8}
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.quick-btn{background:#fff;border-radius:var(--rs);padding:12px 8px;text-align:center;box-shadow:var(--sh);cursor:pointer;border:1px solid var(--g100)}
.quick-btn .qi{font-size:22px;margin-bottom:4px}
.quick-btn .ql{font-size:11px;font-weight:600;color:var(--g700)}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.stat-box{background:#fff;border-radius:var(--rs);padding:12px;text-align:center;box-shadow:var(--sh)}
.stat-box .sv{font-size:22px;font-weight:800;color:var(--ocean)}
.stat-box .sl{font-size:11px;color:var(--g500)}
/* DAD JOKE */
.joke{background:linear-gradient(135deg,#FEF3C7,#FDE68A);border-radius:var(--r);padding:14px;margin-bottom:10px;cursor:pointer;border:1px solid #FCD34D}
.joke h4{font-size:12px;font-weight:700;color:#92400E}
.joke .jq{font-size:14px;font-weight:600;color:var(--g800);margin-top:5px}
.joke .ja{font-size:13px;color:#92400E;margin-top:5px;display:none;font-style:italic}
.joke.open .ja{display:block}
/* ROUTE HEADER */
.rhdr{background:linear-gradient(135deg,var(--ocean),#7C3AED);color:#fff;border-radius:var(--r);padding:18px;margin-bottom:10px;text-align:center}
.rhdr h2{font-size:17px;font-weight:800}
.rhdr .rm{display:flex;justify-content:center;gap:18px;margin-top:8px;font-size:12px}
.rhdr .rm strong{font-size:17px;display:block;font-weight:800}
/* WEATHER IN DAY VIEW */
.wx-card{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border-radius:var(--r);padding:12px;margin-bottom:10px;border:1px solid #BFDBFE}
.wx-inner{display:flex;align-items:center;gap:12px;margin-top:6px}
.wx-icon{font-size:36px}
.wx-temps .hi{font-size:22px;font-weight:800;color:var(--sun)}
.wx-temps .lo{font-size:13px;color:var(--g500)}
.wx-meta{font-size:12px;color:var(--g600);margin-top:4px}
/* FUEL CARD */
.fuel-card{background:linear-gradient(135deg,#D1FAE5,#A7F3D0);border-radius:var(--r);padding:12px;margin-bottom:10px;border:1px solid #6EE7B7}
/* SPOT ROW */
.spot{padding:10px 0;border-bottom:1px solid var(--g100)}
.spot:last-child{border-bottom:none}
.spot h4{font-size:13px;font-weight:600}
.spot p{font-size:12px;color:var(--g500);margin-top:1px}
/* AREA ACCORDION */
.area-hdr{background:linear-gradient(135deg,var(--ocean),#7C3AED);color:#fff;border-radius:var(--r) var(--r) 0 0;padding:14px}
.area-hdr h3{font-size:15px;font-weight:700}
.area-hdr p{font-size:11px;opacity:.85;margin-top:2px}
.area-body{background:#fff;border-radius:0 0 var(--r) var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:12px}
.coll{width:100%;text-align:left;background:none;border:none;cursor:pointer;font:inherit;display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px}
.coll::after{content:'\25BC';font-size:9px;color:var(--g400);transition:transform .3s}
.coll.op::after{transform:rotate(180deg)}
.coll-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.coll-body.op{max-height:2000px}
/* EXPLORE */
.search-bar{width:100%;padding:11px 14px;border-radius:var(--r);border:1.5px solid var(--g200);font-size:14px;background:#fff;margin-bottom:10px;outline:none}
.search-bar:focus{border-color:var(--ocean)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tag{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;background:var(--g100);color:var(--g600);cursor:pointer}
.tag.active{background:var(--ocean);color:#fff}
.sun-card{background:linear-gradient(135deg,#FB923C,#F97316);border-radius:var(--r);padding:14px;margin-bottom:10px;color:#fff}
.sun-card h4{font-size:14px;font-weight:700}
.sun-card p{font-size:12px;opacity:.9;margin-top:3px}
/* BIRTHDAY */
.bday{background:linear-gradient(135deg,#F0ABFC,#C084FC);border-radius:var(--r);padding:18px;margin-bottom:10px;color:#fff;text-align:center}
.bday h3{font-size:20px;font-weight:800}
/* PHOTO */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:8px}
.photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer}
.up-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;border:2px dashed var(--g300);border-radius:var(--r);color:var(--g500);font-size:13px;font-weight:600;cursor:pointer;width:100%;background:#fff;margin-top:8px}
/* LIGHTBOX */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;padding:16px}
.lb.on{display:flex}
.lb img{max-width:100%;max-height:75vh;border-radius:8px;object-fit:contain}
.lb-cap{color:#fff;font-size:13px;margin-top:10px}
.lb-x{position:absolute;top:16px;right:16px;color:#fff;font-size:26px;cursor:pointer;background:rgba(0,0,0,.5);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center}
/* CHECK LIST */
.ci{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--g100)}
.ci:last-child{border-bottom:none}
.ci input[type=checkbox]{width:19px;height:19px;accent-color:var(--ocean);flex-shrink:0;margin-top:1px}
.ci label{font-size:13px;color:var(--g700);cursor:pointer;flex:1}
.ci.done label{text-decoration:line-through;color:var(--g400)}
.ci-del{background:none;border:none;color:var(--g400);font-size:18px;line-height:1;cursor:pointer;padding:0 2px;flex-shrink:0;margin-left:auto}
.ci-del:hover{color:var(--coral)}
.ci-custom label{color:var(--ocean)}
/* ADD ITEM ROW */
.pack-add{display:flex;gap:6px;padding:8px 0 2px;margin-top:4px;border-top:1px dashed var(--g200)}
.pack-add input{flex:1;border:1px solid var(--g200);border-radius:.5rem;padding:6px 10px;font-size:13px;outline:none}
.pack-add input:focus{border-color:var(--ocean)}
.pack-add button{background:var(--ocean);color:#fff;border:none;border-radius:.5rem;padding:6px 14px;font-size:18px;cursor:pointer;font-weight:700;line-height:1}
.pack-add button:active{opacity:.8}
.pack-progress{display:flex;align-items:center;gap:10px;padding:.5rem 1rem .25rem;font-size:.82rem;color:var(--g600)}
.pack-progress-bar{flex:1;height:7px;background:var(--g100);border-radius:99px;overflow:hidden}
.pack-progress-fill{height:100%;background:var(--reef);border-radius:99px;transition:width .3s}
/* GAME CARD */
.gc{background:linear-gradient(135deg,#FEF3C7,#FDE68A);border-radius:var(--r);padding:14px;margin-bottom:10px;border:1px solid #FCD34D}
.gc h4{font-size:14px;font-weight:700}
.gc .gm{font-size:12px;color:var(--g600);margin:3px 0}
.gc p{font-size:13px;color:var(--g700);line-height:1.5}
/* ACTIVITY */
.ac{background:#fff;border-radius:var(--r);padding:12px;margin-bottom:8px;box-shadow:var(--sh);border-left:4px solid var(--reef)}
.ac.bkd{border-left-color:var(--ocean)}
.ac h4{font-size:13px;font-weight:700}
.ac-meta{display:flex;gap:10px;font-size:11px;color:var(--g500);margin-top:3px;flex-wrap:wrap}
/* CONTACT */
.fcard{background:#fff;border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh);border-left:4px solid var(--ocean)}
.crow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--g100)}
.crow:last-child{border-bottom:none}
.crow a{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:var(--g100);font-size:14px;text-decoration:none}
/* MAP */
#tripMap{width:100%;height:380px;border-radius:var(--r);margin-bottom:10px}
.nav-btn{display:inline-flex;align-items:center;gap:4px;padding:7px 13px;background:var(--ocean);color:#fff;border-radius:18px;text-decoration:none;font-size:12px;font-weight:600;margin-top:6px}
/* PLAYLIST */
.pli{background:var(--g50);border-radius:var(--rs);padding:12px;margin-bottom:8px}
.pli-input{width:100%;padding:10px 13px;border:1.5px solid var(--g200);border-radius:var(--rs);font-size:13px;outline:none;margin-bottom:6px}
.pli-input:focus{border-color:var(--ocean)}
.btn{padding:8px 16px;border-radius:18px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.btn-p{background:var(--ocean);color:#fff}
.btn-sm{padding:5px 11px;font-size:11px}
/* CONVOY */
.cvi{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--g100)}
.cvi:last-child{border-bottom:none}
.cvi-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
/* NOTIF */
.notif{background:var(--coral);color:#fff;padding:9px 14px;font-size:13px;text-align:center;cursor:pointer;display:none}
.notif.on{display:block}
/* FIREBASE */
.fb-setup textarea{width:100%;padding:8px;border:1.5px solid var(--g200);border-radius:8px;font-family:monospace;font-size:11px;height:70px;margin:6px 0;outline:none}
@media(min-width:600px){.quick-grid{grid-template-columns:repeat(6,1fr)}.photo-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>

<div class="hdr" id="mainHdr">
  <h1>🌊 WA Road Trip 2026</h1>
  <p>Perth → Exmouth → Perth &bull; 28 Mar – 13 Apr &bull; 5 Families</p>
  <div class="day-strip" id="dayStrip" style="display:none"></div>
</div>

<div id="notif" class="notif"></div>

<div class="content">
  <!-- HOME -->
  <div class="section active" id="sec-home"></div>
  <!-- TRIP -->
  <div class="section" id="sec-trip"></div>
  <!-- EXPLORE -->
  <div class="section" id="sec-explore">
    <input class="search-bar" id="srch" placeholder="Search cafes, surf, sundowners, breweries..." oninput="filterX()">
    <div class="tags" id="xTags"></div>
    <div id="xResults"></div>
  </div>
  <!-- MAP -->
  <div class="section" id="sec-map">
    <div class="card"><div class="card-title">🗺️ Route Map</div>
      <p style="font-size:12px;color:var(--g500);margin-bottom:8px">Tap a marker for details & navigation</p>
      <div id="tripMap"></div>
    </div>
    <div id="mapList"></div>
  </div>
  <!-- MORE -->
  <div class="section" id="sec-more">
    <div class="tags" id="moreTags" style="margin-bottom:10px">
      <span class="tag active" onclick="showMore('activities')">Activities</span>
      <span class="tag" onclick="showMore('packing')">Packing</span>
      <span class="tag" onclick="showMore('people')">People</span>
      <span class="tag" onclick="showMore('photos')">Photos</span>
      <span class="tag" onclick="showMore('music')">Music</span>
      <span class="tag" onclick="showMore('games')">Games</span>
      <span class="tag" onclick="showMore('convoy')">Convoy</span>
      <span class="tag" onclick="showMore('meals')">Meals</span>
      <span class="tag" onclick="showMore('vans')">Vans</span>
    </div>
    <div id="m-activities"></div>
    <div id="m-packing" style="display:none"></div>
    <div id="m-people" style="display:none"></div>
    <div id="m-photos" style="display:none"></div>
    <div id="m-music" style="display:none"></div>
    <div id="m-games" style="display:none"></div>
    <div id="m-convoy" style="display:none"></div>
    <div id="m-meals" style="display:none"></div>
    <div id="m-vans" style="display:none"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lb" id="lb" onclick="closeLb()">
  <div class="lb-x">✕</div>
  <img id="lbImg" src="" alt="">
  <div class="lb-cap" id="lbCap"></div>
</div>

<!-- TAB BAR -->
<div class="tabbar">
  <div class="tab active" onclick="goTab('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </div>
  <div class="tab" onclick="goTab('trip')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Trip</span>
  </div>
  <div class="tab" onclick="goTab('explore')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <span>Explore</span>
  </div>
  <div class="tab" onclick="goTab('map')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
    <span>Map</span>
  </div>
  <div class="tab" onclick="goTab('more')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    <span>More</span>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';
// ===== DAD JOKES (40, rotate every 12h) =====
const JOKES=[
  {q:"Why don't sharks eat clowns?",a:"Because they taste funny!"},
  {q:"What did the ocean say to the beach?",a:"Nothing, it just waved."},
  {q:"Why did the lobster blush?",a:"Because the sea weed."},
  {q:"What's a whale shark's favourite game?",a:"Swallow the leader!"},
  {q:"Why don't oysters share?",a:"Because they're shellfish."},
  {q:"What do you call a fish without eyes?",a:"A fsh."},
  {q:"What did one tide pool say to the other?",a:"Show me your mussels!"},
  {q:"Why are dolphins so smart?",a:"Within 3 hours they can train a human to throw them fish!"},
  {q:"What do you call a lazy crayfish?",a:"A slobster."},
  {q:"Why did the surfer bring a ladder?",a:"Because the surf was way over his head!"},
  {q:"What sits at the bottom of the sea and twitches?",a:"A nervous wreck."},
  {q:"What do sea monsters eat?",a:"Fish and ships."},
  {q:"Why do scuba divers fall backwards off the boat?",a:"If they fell forwards they'd still be in the boat!"},
  {q:"How do you make an octopus laugh?",a:"With ten-tickles."},
  {q:"What did the daddy buffalo say to his kid?",a:"Bison!"},
  {q:"Why couldn't the bicycle stand up by itself?",a:"It was two tired. Just like Dad after a 4-hour drive."},
  {q:"What's a kangaroo's favourite year?",a:"A leap year!"},
  {q:"What do you call a boomerang that doesn't come back?",a:"A stick."},
  {q:"Why did the campervan break up with the caravan park?",a:"It needed more space."},
  {q:"Why are camping trips intense?",a:"Because they're in tents!"},
  {q:"Why do seagulls fly over the sea?",a:"Because if they flew over the bay, they'd be bagels!"},
  {q:"What do you call a fish wearing a crown?",a:"King of the sea-bass."},
  {q:"Why did the pelican get kicked out of the restaurant?",a:"He had a very large bill."},
  {q:"What do you call five campervans in a row?",a:"A mobile home improvement!"},
  {q:"What did the whale say to the whale shark?",a:"Nothing — whale sharks don't speak humpback."},
  {q:"Why did the manta ray cross the road?",a:"To get to the other tide."},
  {q:"What do you call a sleeping dinosaur?",a:"A dino-snore."},
  {q:"What did the beach say to the tide?",a:"Long time no sea!"},
  {q:"Why do cows wear bells?",a:"Because their horns don't work."},
  {q:"I used to hate facial hair...",a:"But then it grew on me."},
  {q:"What's orange and sounds like a parrot?",a:"A carrot."},
  {q:"Why did the koala get fired?",a:"Because he was always dropping his gum."},
  {q:"Why did Aria get a birthday cake at Wooramel?",a:"Because you can't have a birthday without a-RTESIAN baths and cake!"},
  {q:"What's a road trip without snacks?",a:"Un-bear-able. Like sharing a campervan with the Wilsons."},
  {q:"What do you call a crocodile in a campervan?",a:"Whatever he wants."},
  {q:"Why did the shark keep swimming in circles?",a:"It had a school of thought."},
  {q:"Why did the emu cross the road?",a:"To prove he wasn't chicken."},
  {q:"What do you get when you cross a whale with a computer?",a:"A Dell Dolphin."},
  {q:"Why did the snorkeller bring a pencil?",a:"In case he wanted to draw a fish."},
  {q:"What do Exmouth locals say when they're confused?",a:"I'm a bit out of my depth."}
];

function getJoke(dayIdx){
  // Changes every 12 hours, different per day
  const period=Math.floor(Date.now()/(12*3600*1000));
  const idx=(dayIdx*2+(period%2))%JOKES.length;
  return JOKES[idx];
}

async function fetchDayWeather(d, idx){
  const el=$('wx-'+idx);
  if(!el)return;
  const now=new Date();
  const tripDate=new Date(d.date+'T00:00:00+08:00');
  const diffDays=Math.round((tripDate-now)/86400000);

  if(diffDays>16){
    el.innerHTML=`<div class="wx-note">📅 Forecast available from ${new Date(tripDate-16*86400000).toLocaleDateString('en-AU',{day:'numeric',month:'short'})}</div>`;
    return;
  }

  try{
    let apiBase, extraParams='';
    if(diffDays>=-1){
      apiBase='https://api.open-meteo.com/v1/forecast';
    } else {
      apiBase='https://archive-api.open-meteo.com/v1/archive';
    }
    const ds=d.date, de=d.date;
    const url=`${apiBase}?latitude=${d.lat}&longitude=${d.lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode,windspeed_10m_max&start_date=${ds}&end_date=${de}&timezone=Australia%2FPerth`;

    const r=await fetch(url);
    const j=await r.json();
    if(!j.daily||!j.daily.temperature_2m_max){throw new Error('No data');}

    const tmax=Math.round(j.daily.temperature_2m_max[0]);
    const tmin=Math.round(j.daily.temperature_2m_min[0]);
    const prec=j.daily.precipitation_sum[0]||0;
    const wc=j.daily.weathercode[0]||0;
    const wind=Math.round(j.daily.windspeed_10m_max[0]||0);
    const icon=wIcon(wc);
    const label=wLabel(wc);

    // Also fetch surf
    let surfHtml='';
    try{
      const sr=await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${d.lat}&longitude=${d.lon}&daily=wave_height_max&start_date=${ds}&end_date=${de}&timezone=Australia%2FPerth`);
      const sj=await sr.json();
      if(sj.daily&&sj.daily.wave_height_max){
        const wh=sj.daily.wave_height_max[0];
        if(wh!=null){surfHtml=`<div class="wx-surf">🌊 Swell: ${wh.toFixed(1)}m (${bfScale(wh)})</div>`;}
      }
    }catch(e){}

    const source=diffDays>=-1?'Forecast':'Historical avg';
    el.innerHTML=`
<div class="wx-header">${icon} ${label} &nbsp;<span class="wx-src">${source}</span></div>
<div class="wx-temps">${tmax}° / ${tmin}°C</div>
<div class="wx-detail">💧 ${prec.toFixed(1)}mm &nbsp; 💨 ${wind}km/h</div>
${surfHtml}`;
  }catch(e){
    el.innerHTML=`<div class="wx-note">⛅ Weather data unavailable (connect to internet)</div>`;
  }
}

    }).join('');

    return`<button class="coll" onclick="toggleCollapse(this)">${catLabel}</button>
<div class="coll-body">
${defaultRows}${customRows}

}

function toggleCheck(key,val,el){
  packState[key]=val;
  if(el){el.classList.toggle('done',val);}
  try{localStorage.setItem('packState',JSON.stringify(packState));}catch(e){}
  // Update progress bar without full re-render
  const allKeys=[...PACK.map(p=>p.cat+':'+p.item), ...Object.entries(customPack).flatMap(([cat,arr])=>arr.map(ci=>cat+':custom:'+ci.id))];
  const checkedCount=allKeys.filter(k=>packState[k]).length;
  const total=allKeys.length;
  const pct=total?Math.round(checkedCount/total*100):0;
  const fill=$('mp-packing')&&$('mp-packing').querySelector('.pack-progress-fill');
  const lbl=$('mp-packing')&&$('mp-packing').querySelector('.pack-progress');
  if(fill)fill.style.width=pct+'%';
  if(lbl)lbl.firstChild.textContent=checkedCount+'/'+total+' packed ('+pct+'%)';
}

function addPackItem(cat){
  const inp=$('pack-input-'+cat);
  if(!inp)return;
  const text=inp.value.trim();
  if(!text)return;
  if(!customPack[cat])customPack[cat]=[];
  const id=Date.now()+''+Math.floor(Math.random()*1000);
  customPack[cat].push({id,item:text});
  try{localStorage.setItem('customPack',JSON.stringify(customPack));}catch(e){}
  inp.value='';
  renderPacking();
  // Re-open the accordion that was just edited
  const collBtns=$('mp-packing').querySelectorAll('.coll');
  const cats=[...new Set(PACK.map(p=>p.cat))];
  const catIdx=cats.indexOf(cat);
  if(collBtns[catIdx]){
    const body=collBtns[catIdx].nextElementSibling;
    body.style.maxHeight='2000px';
    collBtns[catIdx].classList.add('open');
  }
}

function deletePackItem(cat,id){
  if(!customPack[cat])return;
  customPack[cat]=customPack[cat].filter(ci=>ci.id!==id);
  // Also clear its check state
  delete packState[cat+':custom:'+id];
  try{
    localStorage.setItem('customPack',JSON.stringify(customPack));
    localStorage.setItem('packState',JSON.stringify(packState));
  }catch(e){}
  renderPacking();
}

function handlePhotoUpload(input){
  const files=Array.from(input.files);
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=1200;
        let w=img.width,h=img.height;
        if(w>MAX){h=h*MAX/w;w=MAX;}
        if(h>MAX){w=w*MAX/h;h=MAX;}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const dataUrl=canvas.toDataURL('image/jpeg',0.8);
        const photo={id:Date.now()+Math.random(),url:dataUrl,name:file.name,ts:new Date().toISOString()};
        photos.unshift(photo);
        if(photos.length>50)photos=photos.slice(0,50);
        try{localStorage.setItem('tripPhotos',JSON.stringify(photos));}catch(e){}
        if(fbDb){
          fbDb.ref('photos').push({url:dataUrl,name:file.name,ts:photo.ts});
        }
        renderPhotoGrid();
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderPhotoGrid(){
  const grid=$('photo-grid');
  if(!grid)return;
  if(!photos.length){grid.innerHTML='<p style="padding:1rem;color:#666">No photos yet — be the first to upload one!</p>';return;}
  grid.innerHTML=photos.map((p,i)=>`<div class="photo-thumb" onclick="openLb(${i})"><img src="${p.url}" alt="${p.name}" loading="lazy"></div>`).join('');
}

function openLb(i){
  $('lb-img').src=photos[i].url;
  $('lb-cap').textContent=photos[i].name;
  $('photo-lb').style.display='flex';
}
function closeLb(){$('photo-lb').style.display='none';}

function initFirebase(){
  const url=$('fb-url').value.trim();
  if(!url){alert('Please enter your Firebase Database URL');return;}
  try{
    if(!window.firebase){alert('Firebase SDK not loaded. Please check your internet connection.');return;}
    if(!fbConfig){
      firebase.initializeApp({databaseURL:url});
    }
    fbDb=firebase.database();
    fbDb.ref('photos').on('value',snap=>{
      const data=snap.val();
      if(data){
        const fbPhotos=Object.values(data).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
        photos=[...fbPhotos,...photos.filter(p=>!fbPhotos.find(f=>f.ts===p.ts))];
        renderPhotoGrid();
      }
    });
    $('fb-config-area').innerHTML='<span style="color:#10B981">✅ Firebase connected!</span>';
    try{localStorage.setItem('fbUrl',url);}catch(e){}
  }catch(e){alert('Firebase error: '+e.message);}
}

function renderPlaylists(){
  const el=$('playlist-embeds');
  if(!el)return;
  if(!playlist.length){el.innerHTML='<p style="padding:0 1rem;color:#666">No playlists added yet.</p>';return;}
  el.innerHTML=playlist.map(p=>{
    let embed='';

      embed=`<iframe src="${eUrl}" width="100%" height="80" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
    } else if(p.url.includes('soundcloud.com')){
      embed=`<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(p.url)}&color=%230EA5E9&auto_play=false&hide_related=false&show_comments=false&show_user=true&show_reposts=false&show_teaser=false"></iframe>`;
    } else {
      embed=`<p style="padding:.5rem;color:#e53e3e">⚠️ Only Spotify and SoundCloud URLs supported</p>`;
    }
    return`<div style="margin:.5rem 1rem;position:relative">${embed}<button onclick="removePlaylist(${p.id})" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:14px">×</button></div>`;
  }).join('');
}

function init(){
  // Load saved state
  try{
    const sp=localStorage.getItem('packState');
    if(sp){Object.assign(packState,JSON.parse(sp));}
    const cp=localStorage.getItem('customPack');
    if(cp){Object.assign(customPack,JSON.parse(cp));}
    const ph=localStorage.getItem('tripPhotos');
    if(ph){photos=JSON.parse(ph);}
    const pl=localStorage.getItem('playlist');
    if(pl){playlist=JSON.parse(pl);}
    // Auto-reconnect Firebase
    const fbUrl=localStorage.getItem('fbUrl');
    if(fbUrl&&window.firebase){
      try{
        firebase.initializeApp({databaseURL:fbUrl});
        fbDb=firebase.database();
        fbDb.ref('photos').on('value',snap=>{
          const data=snap.val();
          if(data){
            const fbP=Object.values(data).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
            photos=[...fbP,...photos.filter(p=>!fbP.find(f=>f.ts===p.ts))];
          }
        });
      }catch(e){}
    }
  }catch(e){}

  goTab('home');
}

window.addEventListener('load',init);
