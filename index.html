<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#06B6D4">
<title>WA Road Trip 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --aqua:#06B6D4;--aqua-d:#0891B2;--aqua-l:#CFFAFE;--aqua-xl:#F0FDFF;
  --txt1:#111827;--txt2:#6B7280;--txt3:#9CA3AF;
  --bg:#F7F9FA;--card:#FFFFFF;--border:#F0F0F0;
  --shadow:0 2px 12px rgba(0,0,0,.07);--shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --r:16px;--r-sm:10px;--r-lg:24px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--txt1);-webkit-font-smoothing:antialiased}

/* ── HEADER ─────────────────────────────── */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:#fff;border-bottom:1px solid var(--border);
  padding:env(safe-area-inset-top,0) 0 0;
}
#hdr-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 0;height:48px;
}
#hdr-logo{font-size:15px;font-weight:700;color:var(--aqua);letter-spacing:-.3px}
#hdr-logo span{color:var(--txt1)}
#menu-btn{
  background:none;border:none;cursor:pointer;
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);color:var(--txt2)
}

/* ── DAY STRIP ───────────────────────────── */
#day-strip{
  display:flex;gap:6px;align-items:center;
  padding:10px 16px 12px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;scroll-behavior:smooth;
}
#day-strip::-webkit-scrollbar{display:none}
.dc{
  flex-shrink:0;border:none;cursor:pointer;
  padding:6px 13px;border-radius:999px;
  font-size:12px;font-weight:600;line-height:1.3;
  background:var(--bg);color:var(--txt2);
  transition:all .15s;white-space:nowrap;
  font-family:var(--font);text-align:center;
}
.dc .dc-wday{font-size:10px;font-weight:500;opacity:.8;display:block}
.dc.active{background:var(--aqua);color:#fff}
.dc.today-chip{position:relative}
.dc.today-chip::after{
  content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--aqua);
}
.dc.active.today-chip::after{background:rgba(255,255,255,.7)}

/* ── MAIN SCROLL ─────────────────────────── */
#main{
  padding-top:120px; /* hdr + strip height */
  padding-bottom:32px;
  min-height:100vh;
}

/* ── CARDS ───────────────────────────────── */
.card{
  background:var(--card);border-radius:var(--r);
  box-shadow:var(--shadow);margin:0 16px 14px;overflow:hidden;
}
.ch{display:flex;align-items:center;gap:8px;padding:16px 18px 10px}
.ch-icon{font-size:18px;line-height:1}
.ch-title{font-size:14px;font-weight:700;color:var(--txt1);letter-spacing:-.2px}
.cb{padding:0 18px 16px}

/* ── HERO CARD ───────────────────────────── */
#hero-card{
  margin:0 16px 14px;border-radius:var(--r-lg);overflow:hidden;
  box-shadow:var(--shadow-lg);position:relative;min-height:160px;
}
.hero-bg{
  padding:24px 20px 20px;color:#fff;position:relative;
}
.hero-bg::before{
  content:'';position:absolute;inset:0;background:rgba(0,0,0,.18);
}
.hero-bg > *{position:relative}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;opacity:.85;margin-bottom:4px}
.hero-day{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.hero-route{font-size:14px;opacity:.9;margin-top:4px}
.hero-meta{
  display:flex;gap:16px;margin-top:14px;
}
.hero-meta-item{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:500;opacity:.9}
.hero-acc{
  background:rgba(255,255,255,.15);backdrop-filter:blur(8px);
  border-radius:var(--r-sm);padding:8px 12px;margin-top:10px;
  font-size:13px;display:flex;align-items:center;gap:6px;
}
.hero-acc a{color:#fff;font-weight:600;text-decoration:none}

/* ── COUNTDOWN ───────────────────────────── */
#countdown-card{background:linear-gradient(135deg,var(--aqua-d),var(--aqua));margin:0 16px 14px;border-radius:var(--r-lg);padding:24px 20px;color:#fff;box-shadow:var(--shadow-lg)}
.cd-label{font-size:12px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;opacity:.85;margin-bottom:16px}
.cd-row{display:flex;gap:12px}
.cd-box{flex:1;background:rgba(255,255,255,.15);border-radius:var(--r-sm);padding:12px 8px;text-align:center}
.cd-n{font-size:28px;font-weight:700;line-height:1}
.cd-u{font-size:11px;font-weight:500;opacity:.8;margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.cd-sub{font-size:13px;opacity:.8;margin-top:14px;text-align:center}

/* ── QUOTE CARD ──────────────────────────── */
.quote-text{
  font-size:16px;font-weight:300;line-height:1.65;color:var(--txt1);
  font-style:italic;letter-spacing:-.1px;
}
.quote-text::before{content:'C';font-size:32px;color:var(--aqua);line-height:.5;vertical-align:-.3em;margin-right:4px;font-style:normal;font-weight:700}
.quote-attr{margin-top:12px;font-size:12px;font-weight:600;color:var(--aqua);letter-spacing:.2px}
.quote-src{font-size:11px;color:var(--txt3);margin-top:2px;font-style:italic}

/* ── JOKE CARD ───────────────────────────── */
.joke-wrap{cursor:pointer;user-select:none}
.joke-q{font-size:14px;font-weight:500;color:var(--txt1);line-height:1.5}
.joke-a{
  font-size:14px;font-weight:400;color:var(--aqua-d);line-height:1.5;
  margin-top:10px;padding-top:10px;border-top:1px solid var(--border);
  display:none;
}
.joke-wrap.open .joke-a{display:block}
.joke-hint{font-size:11px;color:var(--txt3);margin-top:8px;display:flex;align-items:center;gap:4px}
.joke-wrap.open .joke-hint{display:none}

/* ── ROUTE MAP CARD ──────────────────────── */
.route-info{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.ri-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--txt2)}
.ri-item strong{color:var(--txt1)}
#day-map-container{
  border-radius:var(--r-sm);overflow:hidden;position:relative;
  height:160px;background:var(--bg);margin-bottom:12px;cursor:pointer;
}
#day-map-container::after{
  content:'';position:absolute;inset:0;background:transparent;z-index:400;
}
.gmap-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:12px;border-radius:var(--r-sm);border:none;cursor:pointer;
  background:var(--aqua);color:#fff;font-size:14px;font-weight:600;
  font-family:var(--font);text-decoration:none;
}
.gmap-btn:active{background:var(--aqua-d)}

/* ── FUEL CARD ───────────────────────────── */
.fuel-alert{
  background:linear-gradient(135deg,#FEF3C7,#FDE68A);
  border-radius:var(--r-sm);padding:10px 12px;margin-bottom:12px;
  font-size:13px;color:#92400E;display:flex;align-items:flex-start;gap:8px;
  border:1px solid #FCD34D;
}
.fuel-station{
  padding:12px 0;border-bottom:1px solid var(--border);
  display:flex;gap:12px;align-items:flex-start;
}
.fuel-station:last-child{border-bottom:none}
.fuel-brand-dot{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;letter-spacing:-.3px;
}
.fuel-right{flex:1;min-width:0}
.fuel-name{font-size:14px;font-weight:600;color:var(--txt1)}
.fuel-addr{font-size:12px;color:var(--txt3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fuel-ph{font-size:12px;color:var(--aqua);margin-top:4px}
.fuel-ph a{color:var(--aqua);text-decoration:none;font-weight:500}
.fuel-note{font-size:12px;color:#B45309;margin-top:4px;font-weight:500}
.fuel-important{border-left:3px solid #F59E0B;padding-left:10px}
.fuelwatch-link{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;padding:10px;background:var(--aqua-xl);border-radius:var(--r-sm);font-size:13px;color:var(--aqua-d);font-weight:600;text-decoration:none;border:1px solid var(--aqua-l)}

/* ── ACTIVITIES CARD ────────────────────── */
.act-section-label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--txt3);margin:12px 0 8px}
.act-item{
  display:flex;gap:12px;align-items:flex-start;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.act-item:last-child{border-bottom:none}
.act-icon{font-size:20px;width:36px;height:36px;background:var(--aqua-xl);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.act-right{flex:1;min-width:0}
.act-name{font-size:14px;font-weight:600;color:var(--txt1);text-decoration:none}
.act-name:visited{color:var(--txt1)}
a.act-name{color:var(--aqua-d)}
.act-desc{font-size:12px;color:var(--txt2);margin-top:3px;line-height:1.45}
.act-meta{display:flex;gap:10px;margin-top:5px;flex-wrap:wrap}
.act-tag{font-size:11px;font-weight:600;color:var(--aqua-d);background:var(--aqua-l);padding:2px 8px;border-radius:999px}
.act-ph{font-size:12px;color:var(--txt3)}
.act-ph a{color:var(--aqua);text-decoration:none}
.act-booked-badge{font-size:10px;font-weight:700;background:#D1FAE5;color:#065F46;padding:2px 7px;border-radius:999px;letter-spacing:.3px}

/* ── AREA INFO CARD ─────────────────────── */
.area-fact-list{list-style:none}
.area-fact-list li{
  padding:8px 0;border-bottom:1px solid var(--border);
  font-size:13px;color:var(--txt2);line-height:1.5;
  display:flex;gap:8px;align-items:flex-start;
}
.area-fact-list li:last-child{border-bottom:none}
.area-fact-list li::before{content:"✦";color:var(--aqua);font-size:10px;flex-shrink:0;margin-top:3px}
.area-body-text{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:12px}

/* ── WILDLIFE CARD ──────────────────────── */
.wildlife-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.wl-item{background:var(--bg);border-radius:var(--r-sm);padding:10px 12px}
.wl-emoji{font-size:22px;margin-bottom:4px}
.wl-name{font-size:12px;font-weight:600;color:var(--txt1)}
.wl-desc{font-size:11px;color:var(--txt3);margin-top:2px;line-height:1.4}

/* ── PHOTOS CARD ────────────────────────── */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:12px}
.photo-thumb{aspect-ratio:1;background:var(--bg);border-radius:6px;overflow:hidden;cursor:pointer}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.upload-row{display:flex;gap:8px}
.upload-btn{
  flex:1;padding:11px;border-radius:var(--r-sm);border:1.5px dashed var(--aqua-l);
  background:var(--aqua-xl);color:var(--aqua-d);font-size:13px;font-weight:600;
  cursor:pointer;text-align:center;font-family:var(--font);
}
.upload-btn:active{background:var(--aqua-l)}
.fb-setup details summary{font-size:13px;color:var(--aqua);cursor:pointer;padding:8px 0}
.fb-setup input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:var(--font);outline:none;margin:6px 0}
.fb-setup input:focus{border-color:var(--aqua)}
.fb-connect-btn{background:var(--aqua);color:#fff;border:none;padding:9px 20px;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)}

/* ── PLAYLIST CARD ──────────────────────── */
.pl-input-row{display:flex;gap:8px;margin-bottom:12px}
.pl-input-row input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:var(--font);outline:none;background:#fff}
.pl-input-row input:focus{border-color:var(--aqua)}
.pl-add-btn{background:var(--aqua);color:#fff;border:none;padding:10px 16px;border-radius:var(--r-sm);font-size:18px;font-weight:700;cursor:pointer;line-height:1;font-family:var(--font)}
.pl-item{position:relative;margin-bottom:8px}
.pl-del{position:absolute;top:6px;right:6px;z-index:5;background:rgba(0,0,0,.45);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── BIRTHDAY CARD ──────────────────────── */
.bday-card{
  background:linear-gradient(135deg,#EC4899,#F472B6,#FDE68A);
  border-radius:var(--r-lg);margin:0 16px 14px;padding:24px 20px;color:#fff;
  box-shadow:var(--shadow-lg);text-align:center;
}
.bday-title{font-size:24px;font-weight:700;letter-spacing:-.5px}
.bday-sub{font-size:14px;opacity:.9;margin-top:6px;line-height:1.5}
.bday-ideas{margin-top:16px;text-align:left}
.bday-idea{background:rgba(255,255,255,.2);border-radius:var(--r-sm);padding:8px 12px;margin-bottom:6px;font-size:13px;display:flex;gap:8px;align-items:flex-start}

/* ── SIDE DRAWER ────────────────────────── */
#drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s}
#drawer-overlay.open{opacity:1;pointer-events:all}
#drawer{
  position:fixed;top:0;right:-320px;bottom:0;width:300px;
  background:#fff;z-index:501;transition:right .25s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:env(safe-area-inset-top,0) 0 0;
}
#drawer.open{right:0}
.drawer-hdr{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.drawer-hdr h2{font-size:16px;font-weight:700}
.drawer-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--txt2);padding:4px}
.drawer-section{padding:14px 18px;border-bottom:1px solid var(--border)}
.drawer-section-title{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--txt3);margin-bottom:10px}
.contact-card{margin-bottom:10px}
.cc-name{font-size:14px;font-weight:700;color:var(--txt1)}
.cc-van{font-size:12px;color:var(--txt3);margin-bottom:4px}
.cc-row{font-size:13px;color:var(--txt2);margin:2px 0;display:flex;gap:8px;align-items:center}
.cc-row a{color:var(--aqua);text-decoration:none}

/* ── PACKING IN DRAWER ──────────────────── */
.pack-cat-label{font-size:12px;font-weight:700;color:var(--txt2);margin:10px 0 4px;display:flex;align-items:center;gap:6px}
.pack-check{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.pack-check:last-child{border-bottom:none}
.pack-check input{width:17px;height:17px;accent-color:var(--aqua);flex-shrink:0;margin-top:1px}
.pack-check label{flex:1;color:var(--txt2);cursor:pointer}
.pack-check.done label{text-decoration:line-through;color:var(--txt3)}
.pack-del{background:none;border:none;color:var(--txt3);font-size:16px;cursor:pointer;padding:0;margin-left:auto}
.pack-add-row{display:flex;gap:6px;margin-top:8px}
.pack-add-row input{flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:var(--font);outline:none}
.pack-add-row input:focus{border-color:var(--aqua)}
.pack-add-row button{background:var(--aqua);color:#fff;border:none;border-radius:var(--r-sm);padding:7px 14px;font-size:16px;cursor:pointer;font-weight:700}
.pack-progress-bar{height:5px;background:var(--border);border-radius:99px;margin:8px 0;overflow:hidden}
.pack-progress-fill{height:100%;background:var(--aqua);border-radius:99px;transition:width .3s}
.pack-progress-text{font-size:11px;color:var(--txt3);text-align:right;margin-bottom:10px}

/* ── LIGHTBOX ───────────────────────────── */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:900;align-items:center;justify-content:center;flex-direction:column}
#lb.open{display:flex}
#lb img{max-width:94vw;max-height:80vh;border-radius:var(--r-sm);object-fit:contain}
#lb-cap{color:rgba(255,255,255,.7);font-size:13px;margin-top:12px;text-align:center}
#lb-x{position:absolute;top:16px;right:16px;color:#fff;font-size:26px;cursor:pointer;background:rgba(255,255,255,.15);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* ── COLLAPSIBLE ────────────────────────── */
.coll-trigger{
  width:100%;background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;font-size:13px;font-weight:600;color:var(--txt1);
  font-family:var(--font);border-top:1px solid var(--border);
}
.coll-trigger .coll-arrow{color:var(--txt3);font-size:16px;transition:transform .2s}
.coll-trigger.open .coll-arrow{transform:rotate(180deg)}
.coll-body{display:none;padding-bottom:8px}
.coll-body.open{display:block}

/* ── SECTION DIVIDER ────────────────────── */
.section-eyebrow{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--txt3);padding:6px 16px 2px}

/* ── UTILS ───────────────────────────────── */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--aqua-l);color:var(--aqua-d)}
.link{color:var(--aqua-d);text-decoration:none;font-weight:500}
.link:active{opacity:.7}
.empty-state{color:var(--txt3);font-size:13px;text-align:center;padding:20px 0}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div id="hdr-inner">
    <div id="hdr-logo">🌊 <span>WA Trip 2026</span></div>
    <button id="menu-btn" onclick="openDrawer()">
      <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
        <path d="M0 1h18M0 7h18M0 13h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div id="day-strip"></div>
</div>

<!-- MAIN CONTENT -->
<div id="main">
  <div id="day-content"></div>
</div>

<!-- SIDE DRAWER -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div class="drawer-hdr">
    <h2>📋 Trip Info</h2>
    <button class="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div id="drawer-body"></div>
</div>

<!-- LIGHTBOX -->
<div id="lb" onclick="closeLb()">
  <div id="lb-x">×</div>
  <img id="lb-img" src="" alt="">
  <div id="lb-cap"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

// ======================================================
// DATA
// ======================================================

const DAYS = [
  {day:1,date:"2026-03-28",wday:"Sat",lbl:"28 Mar",from:"Perth",to:"Jurien Bay",via:"Cervantes",km:220,drv:"2h 45m",
   acc:"Jurien Bay Tourist Park",accUrl:"https://summerstar.com.au/caravan-parks/jurien-bay",
   food:"Lobster Shack Cervantes",foodUrl:"https://www.lobstershack.com.au",
   grad:"linear-gradient(135deg,#0891B2 0%,#06B6D4 100%)",
   lat:-30.306,lon:115.038,fromLat:-31.9505,fromLon:115.8605,bday:false,
   note:"Campervans collected 9am from 2 Redcliffe Rd, Redcliffe. Adventure begins!"},
  {day:2,date:"2026-03-29",wday:"Sun",lbl:"29 Mar",from:"Jurien Bay",to:"Jurien Bay",via:"",km:0,drv:"Rest day",
   acc:"Jurien Bay Tourist Park",accUrl:"https://summerstar.com.au/caravan-parks/jurien-bay",
   food:"Jurien Jetty Cafe",foodUrl:"https://www.google.com/maps/search/Jurien+Jetty+Cafe",
   grad:"linear-gradient(135deg,#0E7490 0%,#22D3EE 100%)",
   lat:-30.306,lon:115.038,fromLat:-30.306,fromLon:115.038,bday:false,
   note:"Explore day — sea lions, dunes, and the jetty."},
  {day:3,date:"2026-03-30",wday:"Mon",lbl:"30 Mar",from:"Jurien Bay",to:"Kalbarri",via:"Geraldton",km:360,drv:"4h",

// ======================================================
// HELPERS
// ======================================================
function $(id){return document.getElementById(id);}

function getCurrentDayIdx(){
  const now = new Date();
  const trip_start = new Date('2026-03-28');
  const trip_end   = new Date('2026-04-13');
  if(now < trip_start) return 0;
  if(now > trip_end)   return DAYS.length - 1;
  const today = now.toISOString().slice(0,10);
  const idx = DAYS.findIndex(d => d.date === today);
  return idx >= 0 ? idx : 0;
}

function isToday(dateStr){
  return new Date().toISOString().slice(0,10) === dateStr;
}

function brandInitials(brand){
  if(!brand) return '⛽';
  const map = {BP:'BP',Caltex:'CT',United:'U',Shell:'SH',Ampol:'AM',Puma:'PM',Roadhouse:'RH',Independent:'IND'};
  return map[brand] || brand.slice(0,2).toUpperCase();
}

// ======================================================
// DAY STRIP
// ======================================================
function renderDayStrip(){
  const strip = $('day-strip');
  strip.innerHTML = DAYS.map((d,i) => {
    const parts = d.lbl.split(' ');
    const dayNum = parts[0];
    const mon = parts[1] || '';
    const active = i === curDay ? ' active' : '';
    const todayCls = isToday(d.date) ? ' today-chip' : '';
    return `<button class="dc${active}${todayCls}" onclick="selectDay(${i})">
      <span class="dc-wday">${d.wday}</span>${dayNum} ${mon}</button>`;
  }).join('');
  // Scroll active chip into view
  setTimeout(()=>{
    const active = strip.querySelector('.dc.active');
    if(active) active.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  },100);
}

function selectDay(i){
  curDay = i;
  // Remove old map instance so it reinitialises
  if(mapInstance){ mapInstance.remove(); mapInstance = null; }
  renderDayStrip();
  renderDay(i);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderMap(i){
  const d = DAYS[i];
  setTimeout(()=>{
    const el = $('day-map-container');
    if(!el) return;
    try{
      if(mapInstance){ mapInstance.remove(); mapInstance = null; }
      mapInstance = L.map('day-map-container', {zoomControl:false, attributionControl:false, dragging:false, scrollWheelZoom:false, doubleClickZoom:false, touchZoom:false});
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:14}).addTo(mapInstance);
      const mkFrom = L.circleMarker([d.fromLat,d.fromLon],{radius:7,color:'#fff',weight:2,fillColor:d.grad.includes('#0891B2')?'#0891B2':'#06B6D4',fillOpacity:1}).addTo(mapInstance);
      const mkTo   = L.circleMarker([d.lat,d.lon],{radius:9,color:'#fff',weight:2,fillColor:'#06B6D4',fillOpacity:1}).addTo(mapInstance);
      if(d.lat !== d.fromLat || d.lon !== d.fromLon){
        L.polyline([[d.fromLat,d.fromLon],[d.lat,d.lon]],{color:'#06B6D4',weight:3,dashArray:'6,4'}).addTo(mapInstance);
        mapInstance.fitBounds([[d.fromLat,d.fromLon],[d.lat,d.lon]],{padding:[25,25]});
      } else {
        mapInstance.setView([d.lat,d.lon],10);
      }
    }catch(e){ if(el) el.innerHTML='<p style="padding:12px;color:var(--txt3);font-size:13px">Map requires internet connection</p>'; }
  },200);
}

// ======================================================
// WEATHER
// ======================================================
async function fetchWeather(d, i){
  const el = $('wx-body-'+i);
  if(!el) return;
  const now = new Date();
  const tripDate = new Date(d.date+'T00:00:00+08:00');
  const diff = Math.round((tripDate - now) / 86400000);
  if(diff > 16){
    const avail = new Date(tripDate - 16*86400000).toLocaleDateString('en-AU',{day:'numeric',month:'short'});
    el.innerHTML = `<span>📅 Forecast available from ${avail}</span>`; return;
  }
  try{
    const base = diff >= -1 ? 'https://api.open-meteo.com/v1/forecast' : 'https://archive-api.open-meteo.com/v1/archive';
    const url = `${base}?latitude=${d.lat}&longitude=${d.lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode,windspeed_10m_max&start_date=${d.date}&end_date=${d.date}&timezone=Australia%2FPerth`;
    const resp = await fetch(url);
    const json = await resp.json();
    const dd = json.daily;
    if(!dd || !dd.temperature_2m_max) throw new Error('no data');
    const tmax = Math.round(dd.temperature_2m_max[0]);
    const tmin = Math.round(dd.temperature_2m_min[0]);
    const prec = (dd.precipitation_sum[0]||0).toFixed(1);
    const wind = Math.round(dd.windspeed_10m_max[0]||0);
    const code = dd.weathercode[0]||0;
    const icons = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'⛈️',80:'🌦️',95:'⛈️'};
    const labels = {0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',51:'Drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',80:'Showers',95:'Thunderstorm'};
    const icon = icons[code]||'🌤️';
    const label = labels[code]||'Variable';
    const src = diff >= -1 ? 'Live forecast' : 'Historical avg';
    el.innerHTML = `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div style="font-size:32px;line-height:1">${icon}</div>
      <div>
        <div style="font-size:16px;font-weight:700;color:var(--txt1)">${tmax}° <span style="font-weight:400;color:var(--txt3)">/ ${tmin}°C</span></div>
        <div style="font-size:13px;color:var(--txt2)">${label}</div>
      </div>
      <div style="margin-left:auto;text-align:right">
        <div style="font-size:13px;color:var(--txt2)">💧 ${prec}mm · 💨 ${wind}km/h</div>
        <div style="font-size:11px;color:var(--txt3);margin-top:2px">${src}</div>
      </div>
    </div>`;
    // Try marine/surf
    try{
      const sr = await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${d.lat}&longitude=${d.lon}&daily=wave_height_max&start_date=${d.date}&end_date=${d.date}&timezone=Australia%2FPerth`);
      const sj = await sr.json();
      if(sj.daily&&sj.daily.wave_height_max){
        const wh = sj.daily.wave_height_max[0];
        if(wh!=null){
          const surf = wh<0.5?'Calm':wh<1.25?'Slight':wh<2.5?'Moderate':wh<4?'Rough':'Very rough';
          el.innerHTML += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:13px;color:var(--txt2)">🌊 Swell: ${wh.toFixed(1)}m (${surf})</div>`;
        }
      }
    }catch(e){}
  }catch(e){
    el.innerHTML = `<span>⛅ Connect to the internet for live forecast</span>`;
  }
}

function handlePhotoUpload(input){
  Array.from(input.files).forEach(file=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 1200;
        let w = img.width, h = img.height;
        if(w > MAX){ h = h*MAX/w; w = MAX; }
        if(h > MAX){ w = w*MAX/h; h = MAX; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const dataUrl = canvas.toDataURL('image/jpeg',0.8);
        const photo = {id:Date.now()+Math.random(), url:dataUrl, name:file.name, ts:new Date().toISOString()};
        photos.unshift(photo);
        if(photos.length > 60) photos = photos.slice(0,60);
        try{ localStorage.setItem('tripPhotos', JSON.stringify(photos)); }catch(e){}
        if(fbDb) fbDb.ref('photos').push({url:dataUrl,name:file.name,ts:photo.ts});
        renderPhotoGrid();
        const lbl = $('photo-count-lbl');
        if(lbl) lbl.textContent = photos.length+' photo'+(photos.length!==1?'s':'');
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderPhotoGrid(){
  const grid = $('photo-grid-main');
  if(!grid) return;
  if(!photos.length){ grid.innerHTML=''; return; }
  grid.innerHTML = photos.map((p,i) => `<div class="photo-thumb" onclick="openLb(${i})"><img src="${p.url}" loading="lazy"></div>`).join('');
}

function openLb(i){ $('lb-img').src=photos[i].url; $('lb-cap').textContent=photos[i].name; $('lb').classList.add('open'); }
function closeLb(){ $('lb').classList.remove('open'); }

function connectFirebase(){
  const url = ($('fb-url-input')||{}).value;
  if(!url) return;
  try{
    if(!window.firebase){ alert('Firebase SDK not loaded — check internet connection'); return; }
    firebase.initializeApp({databaseURL:url});
    fbDb = firebase.database();
    fbDb.ref('photos').on('value', snap => {
      const data = snap.val();
      if(data){
        const fbP = Object.values(data).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
        photos = [...fbP, ...photos.filter(p=>!fbP.find(f=>f.ts===p.ts))];
        renderPhotoGrid();
      }
    });
    try{ localStorage.setItem('fbUrl', url); }catch(e){}
    renderDay(curDay);
  }catch(e){ alert('Firebase error: '+e.message); }
}

function renderPlaylists(){
  const el = $('playlist-items');
  if(!el) return;
  if(!playlist.length){ el.innerHTML='<p style="font-size:13px;color:var(--txt3)">No playlists yet — add a Spotify or SoundCloud link above.</p>'; return; }
  el.innerHTML = playlist.map(p => {
    let embed = '';
    if(p.url.includes('spotify.com')){
      embed = `<iframe src="${p.url.replace('open.spotify.com/','open.spotify.com/embed/')}" width="100%" height="80" frameborder="0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe>`;
    } else if(p.url.includes('soundcloud.com')){
      embed = `<iframe width="100%" height="120" scrolling="no" frameborder="no" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(p.url)}&color=%2306B6D4&auto_play=false&hide_related=true&show_comments=false&show_user=true"></iframe>`;
    } else {
      embed = `<p style="font-size:12px;color:var(--txt3)">⚠️ Spotify or SoundCloud URLs only</p>`;
    }
    return `<div class="pl-item">${embed}<button class="pl-del" onclick="removePlaylistItem(${p.id})">×</button></div>`;
  }).join('');
}

        const key = cat+':'+p.item;
        return `<div class="pack-check${packState[key]?' done':''}">
          <input type="checkbox" ${packState[key]?'checked':''} onchange="packToggle('${key}',this.checked,this.closest('.pack-check'))">
          <label onclick="this.previousElementSibling.click()">${p.item}${p.ess?' ⭐':''}</label></div>`;
      }),
      ...customs.map(ci => {
        const key = cat+':custom:'+ci.id;
        const safe = ci.item.replace(/'/g,'&#39;');
        return `<div class="pack-check${packState[key]?' done':''}">
          <input type="checkbox" ${packState[key]?'checked':''} onchange="packToggle('${key}',this.checked,this.closest('.pack-check'))">
          <label onclick="this.previousElementSibling.click()" style="color:var(--aqua)">${ci.item}</label>
          <button class="pack-del" onclick="packDelete('${cat}','${ci.id}')">×</button></div>`;
      })
    ].join('');
    return `<div style="margin-bottom:6px">
      <div class="pack-cat-label">${catLabels[cat]||cat}</div>
      ${rows}
      <div class="pack-add-row">
        <input id="pack-inp-${cat}" placeholder="Add item…" onkeydown="if(event.key==='Enter')packAdd('${cat}')">
        <button onclick="packAdd('${cat}')">+</button>
      </div>
    </div>`;
  }).join('');

  const famHtml = FAM.map(f => `<div class="contact-card" style="border-left:3px solid ${f.col};padding-left:10px;margin-bottom:12px">
    <div class="cc-name">${f.emoji} The ${f.name}s <span style="font-size:11px;color:var(--txt3)">Van ${f.van}</span></div>
    ${f.note?`<div class="cc-van">${f.note}</div>`:''}
    <div class="cc-row">👨 ${f.dad} · <a href="tel:${f.dadPh}">${f.dadPh}</a></div>
    <div class="cc-row">👩 ${f.mum} · <a href="tel:${f.mumPh}">${f.mumPh}</a></div>
    <div class="cc-row" style="font-size:12px;color:var(--txt3)">👦 ${f.kids.join(', ')}</div>
  </div>`).join('');

  $('drawer-body').innerHTML = `
  <div class="drawer-section">
    <div class="drawer-section-title">👨‍👩‍👧 The Families</div>
    ${famHtml}
    <div class="contact-card" style="border-left:3px solid var(--txt3);padding-left:10px">
      <div class="cc-name">🚐 Campervan Broker</div>
      <div class="cc-row">Sarah Feldman · <a href="tel:${BROKER.ph}">${BROKER.ph}</a></div>
      <div class="cc-row"><a href="mailto:${BROKER.email}">${BROKER.email}</a></div>
      <div class="cc-row" style="font-size:12px;color:var(--txt3)">${BROKER.addr} · ${BROKER.hours}</div>
    </div>
  </div>
  <div class="drawer-section">
    <div class="drawer-section-title">🎒 Packing List</div>
    <div class="pack-progress-bar"><div class="pack-progress-fill" style="width:${pct}%"></div></div>
    <div class="pack-progress-text">${checked}/${total} packed (${pct}%)</div>
    ${packHtml}
  </div>`;
}

function packToggle(key, val, el){
  packState[key] = val;
  if(el) el.classList.toggle('done', val);
  try{ localStorage.setItem('packState', JSON.stringify(packState)); }catch(e){}
  // Update bar
  const allKeys = [...PACK.map(p=>p.cat+':'+p.item), ...Object.entries(customPack).flatMap(([c,arr])=>arr.map(ci=>c+':custom:'+ci.id))];
  const checked = allKeys.filter(k=>packState[k]).length;
  const total = allKeys.length;
  const pct = total ? Math.round(checked/total*100) : 0;
  const fill = document.querySelector('.pack-progress-fill');
  const lbl  = document.querySelector('.pack-progress-text');
  if(fill) fill.style.width = pct+'%';
  if(lbl)  lbl.textContent  = checked+'/'+total+' packed ('+pct+'%)';
}
function packAdd(cat){
  const inp = $('pack-inp-'+cat);
  if(!inp || !inp.value.trim()) return;
  if(!customPack[cat]) customPack[cat]=[];
  const id = Date.now()+''+Math.floor(Math.random()*1000);
  customPack[cat].push({id, item:inp.value.trim()});
  inp.value = '';
  try{ localStorage.setItem('customPack', JSON.stringify(customPack)); }catch(e){}
  renderDrawer();
}
function packDelete(cat,id){
  if(!customPack[cat]) return;
  customPack[cat] = customPack[cat].filter(ci=>ci.id!==id);
  delete packState[cat+':custom:'+id];
  try{ localStorage.setItem('customPack',JSON.stringify(customPack)); localStorage.setItem('packState',JSON.stringify(packState)); }catch(e){}
  renderDrawer();
}

// ======================================================
// INIT
// ======================================================
function init(){
  try{
    const sp = localStorage.getItem('packState');    if(sp) Object.assign(packState, JSON.parse(sp));
    const cp = localStorage.getItem('customPack');   if(cp) Object.assign(customPack, JSON.parse(cp));
    const ph = localStorage.getItem('tripPhotos');   if(ph) photos = JSON.parse(ph);
    const pl = localStorage.getItem('playlist');     if(pl) playlist = JSON.parse(pl);
    const fb = localStorage.getItem('fbUrl');
    if(fb && window.firebase){
      try{
        firebase.initializeApp({databaseURL:fb});
        fbDb = firebase.database();
        fbDb.ref('photos').on('value', snap => {
          const data = snap.val();
          if(data){ const fbP=Object.values(data).sort((a,b)=>new Date(b.ts)-new Date(a.ts)); photos=[...fbP,...photos.filter(p=>!fbP.find(f=>f.ts===p.ts))]; }
        });
      }catch(e){}
    }
  }catch(e){}

  curDay = getCurrentDayIdx();
  renderDayStrip();
  renderDay(curDay);
}

window.addEventListener('load', init);
</script>
</body>
</html>
